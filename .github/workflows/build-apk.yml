name: Build Debug APK

# Trigger on push to main, manual dispatch, and pull requests.
# APK is uploaded as a GitHub Actions artifact (downloadable from the run page).
# We do NOT publish to GitHub Releases automatically — that's a manual step
# once the build is verified on a real device.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    # contents: write is needed to publish the APK to a GitHub Release
    # (a durable delivery channel that does not consume the Actions
    # artifact-storage quota).
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-35 build-tools;35.0.0'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', 'gradle/libs.versions.toml', 'gradle.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest --no-daemon

      # Primary delivery: publish the APK to a rolling pre-release. Release
      # assets do NOT count against the Actions artifact-storage quota, so this
      # keeps working even when that quota is exhausted. The `debug-latest` tag
      # is recreated each run so the download URL is always stable:
      #   .../releases/download/debug-latest/app-debug.apk
      - name: Publish APK to rolling debug release
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete debug-latest --yes --cleanup-tag || true
          gh release create debug-latest app/build/outputs/apk/debug/*.apk \
            --prerelease \
            --title "Debug APK (latest)" \
            --target "$GITHUB_SHA" \
            --notes "Auto-built debug APK from ${GITHUB_SHA} on ${GITHUB_REF_NAME}."

      # Secondary (best-effort) delivery: also upload as an Actions artifact.
      # continue-on-error so a full artifact-storage quota does not fail the
      # build — the Release above is the reliable channel.
      - name: Upload APK artifact (best-effort)
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: hermes2-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
          if-no-files-found: error

      - name: Upload test results (best-effort)
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            app/build/reports/tests/
            app/build/test-results/
          retention-days: 7
          if-no-files-found: warn
